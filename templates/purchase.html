{% extends "base.html" %}
{% block content %}

<!-- Mostrar título -->
<h2>Compra / Venta / Tradeo</h2>

<!-- Mostrar error si existe -->
{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<!-- Crear formulario -->
<form method="POST">

    <!-- Seleccionar moneda origen -->
    <label>From:</label>
    <select name="coin_from">
        {% for m in monedas %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
    </select>

    <!-- Introducir cantidad -->
    <label>Cantidad:</label>
    <input type="number" step="any" name="cantidad" required>

    <!-- Seleccionar moneda destino -->
    <label>To:</label>
    <select name="coin_to">
        {% for m in monedas %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
    </select>

    <!-- Botón calcular -->
    <button type="submit" name="action" value="calcular">Calcular</button>

    <!-- Botón confirmar -->
    <button type="submit" name="action" value="confirmar">Confirmar</button>

</form>

<!-- Mostrar resultado -->
{% if cantidad_to %}
<div class="resultado">
    <p><strong>Resultado:</strong> {{ cantidad_to | euro }}</p>
</div>
{% endif %}

{% endblock %}
