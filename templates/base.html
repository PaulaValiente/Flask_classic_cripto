<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Definir metadatos básicos y CSS -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cripto Movimientos</title>

    <!-- Cargar estilos -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

<header>
    <!-- Mostrar cabecera y navegación -->

    <h1>Cripto Movimientos</h1>

    <nav class="menu">
        <!-- Marcar enlace activo según la ruta actual -->

        <a href="/" class="{% if request.path == '/' %}activo{% endif %}">Inicio</a>
        <a href="/purchase" class="{% if request.path == '/purchase' %}activo{% endif %}">Nueva operación</a>
        <a href="/status" class="{% if request.path == '/status' %}activo{% endif %}">Estado</a>
    </nav>
</header>

<main>
    <!-- Insertar contenido dinámico de cada página -->

    {% block content %}
    {% endblock %}
</main>

<footer>
    <!-- Mostrar pie de página -->

    <p>© 2026 CriptoMovimientos</p>
</footer>

</body>
</html>
